name: Release monorepo packages
on:
  workflow_dispatch:

env:
  CPU_CORES: 2
  HUSKY: 0

jobs:
  release:
    name: Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: npm-release
      url: https://www.npmjs.com/package/@jentic/api-scorecard-cli
    outputs:
      version: ${{ steps.version.outputs.value }}
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.10.0
          registry-url: https://registry.npmjs.org
      - name: Install monorepo dependencies
        run: npm ci --engine-strict=false
      - name: Build monorepo
        run: npm run build
      - name: Check TypeScript types
        run: npm run typescript:check-types
      - name: Version bump & GitHub release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npx lerna version prerelease --preid alpha --no-private --yes --force-publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Mark release as latest
        run: |
          VERSION=$(node -p "require('./lerna.json').version")
          gh release edit "v${VERSION}" --prerelease=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract released version
        id: version
        run: echo "value=$(node -p 'require("./lerna.json").version')" >> "$GITHUB_OUTPUT"
      # Pack BEFORE `lerna publish` so the bytes we attest are the bytes
      # lerna will publish: both calls invoke `npm-packlist` against the
      # same source tree with normalized mtimes, so the tarballs are
      # byte-identical (matching SHA-256). Packing AFTER publish picks up
      # state lerna leaves behind on disk and produces a different digest.
      - name: Pack CLI tarball locally
        run: |
          mkdir -p ./artifacts
          npm pack -w @jentic/api-scorecard-cli --pack-destination ./artifacts/
      - name: Generate SPDX SBOM for CLI
        run: |
          mkdir -p ./artifacts/sbom-staging
          cp packages/cli/package.json ./artifacts/sbom-staging/
          (cd ./artifacts/sbom-staging \
            && npm install --omit=dev --no-audit --no-fund --ignore-scripts \
            && npm sbom --sbom-format=spdx --sbom-type=application --omit=dev \
              > ../cli.sbom.spdx.json)
          jq empty ./artifacts/cli.sbom.spdx.json
      - name: Attest SBOM
        uses: actions/attest@v4
        with:
          subject-path: ./artifacts/jentic-api-scorecard-cli-${{ steps.version.outputs.value }}.tgz
          sbom-path: ./artifacts/cli.sbom.spdx.json
      - name: Publish monorepo npm packages
        run: npx lerna publish from-package --no-private --yes --dist-tag alpha

  publish-docker:
    needs: [release]
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write

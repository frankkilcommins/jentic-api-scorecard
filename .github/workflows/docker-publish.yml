name: Publish Docker Image

on:
  push:
    branches: [main]
  workflow_call:
    inputs:
      version:
        description: Semver tag without v prefix (e.g. 1.0.0-alpha.1)
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    if: ${{ !inputs.version }}
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    if: ${{ !cancelled() && (needs.ci.result == 'success' || needs.ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/jentic/jentic-api-scorecard:${{ inputs.version || 'unstable' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test Docker image
        if: inputs.version
        run: docker run --rm ghcr.io/jentic/jentic-api-scorecard:${{ inputs.version }} score --help
